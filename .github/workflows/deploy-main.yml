name: Deploy on main push

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE_REPO_NAME: ${{ vars.IMAGE_REPO_NAME }}
  WEBAPP_NAME: ${{ vars.WEBAPP_NAME }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  build_push_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR access token
        id: get_acr_access_token
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
            TOKEN="$(az acr login --name "${ACR_NAME}" --expose-token --query accessToken -o tsv)"
            echo "::add-mask::${TOKEN}"
            echo "token=${TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: 00000000-0000-0000-0000-000000000000
          password: ${{ steps.get_acr_access_token.outputs.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO_NAME }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO_NAME }}:${{ github.sha }}

      - name: Point web app to latest image
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            az webapp config container set \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --name "${WEBAPP_NAME}" \
              --docker-custom-image-name "${ACR_LOGIN_SERVER}/${IMAGE_REPO_NAME}:latest" \
              --docker-registry-server-url "https://${ACR_LOGIN_SERVER}"

      - name: Restart web app
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp restart \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --name "${WEBAPP_NAME}"
